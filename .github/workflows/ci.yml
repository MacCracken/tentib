name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:   # release.yml gates on this via `uses: ./.github/workflows/ci.yml`

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (pinned 2026-06-19)

      - name: Install Cyrius toolchain
        # Upstream install.sh lays out $HOME/.cyrius/{bin,lib,versions/<v>} — the
        # hand-rolled curl+cp-into-bin form skips versions/<v>/ and so fails the
        # `cyrius deps` pin-check / `cyrius lib sync` once git deps (rosnet/tyche/
        # akshara at M1) land. Reference: tarka (same dep profile) / patra / sit.
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/${{ github.event.repository.name }}

      - name: Test
        # v5.6.28: bare `cyrius test` picks up the [build].test entry
        # AND auto-discovers tests/*.tcyr — avoids the previous
        # `cyrius test src/test.cyr` form that hard-failed when the
        # stub didn't exist (Issue 1) and also wouldn't ever exercise
        # tests/${proj}.tcyr.
        run: cyrius test
